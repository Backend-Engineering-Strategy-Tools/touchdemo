name: Build & Release Go Touch Demo

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
            runner: ubuntu-latest
          - os: linux
            arch: arm64
            runner: ubuntu-latest
          - os: darwin
            arch: amd64
            runner: macos-13
          - os: darwin
            arch: arm64
            runner: macos-latest
          - os: windows
            arch: amd64
            runner: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v4
        with:
          go-version: 1.22

      - name: Build binary
        shell: bash
        run: |
          NAME=touchdemo-${{ github.ref_name }}-${{ matrix.os }}-${{ matrix.arch }}
          if [ "${{ matrix.os }}" = "windows" ]; then
            NAME="$NAME.exe"
          fi
          echo "Building $NAME"
          if [ "${{ matrix.os }}" = "darwin" ]; then
            GOOS=${{ matrix.os }} GOARCH=${{ matrix.arch }} \
            go build -ldflags "-X main.version=${{ github.ref_name }}" -o $NAME main.go
          else
            GOOS=${{ matrix.os }} GOARCH=${{ matrix.arch }} \
            go build -tags=ci -ldflags "-X main.version=${{ github.ref_name }}" -o $NAME main.go
          fi

      - name: Sign macOS binary
        if: matrix.os == 'darwin'
        run: |
          codesign --force --deep --sign - touchdemo-${{ github.ref_name }}-${{ matrix.os }}-${{ matrix.arch }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.os }}-${{ matrix.arch }}
          path: touchdemo-${{ github.ref_name }}-${{ matrix.os }}-${{ matrix.arch }}*

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts
        run: |
          mkdir release
          find artifacts -type f -exec cp {} release/ \;
          ls -la release

      - name: Generate checksums
        run: |
          cd release
          sha256sum * > checksums.txt
          cat checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}