name: Build & Release Go Touch Demo

on:
  push:
    tags:
      - 'v*.*.*'       # trigger releases on version tags
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goarch: [amd64, arm64]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: 1.22

      - name: Build Linux binary (headless)
        run: |
          echo "Building for Linux ${{ matrix.goarch }}"
          GOOS=linux GOARCH=${{ matrix.goarch }} go build -tags=ci -o touchdemo-${{ github.ref_name }}-${{ matrix.goarch }} main.go

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: touchdemo-${{ github.ref_name }}-${{ matrix.goarch }}
          path: touchdemo-${{ github.ref_name }}-${{ matrix.goarch }}

  build-macos:
    runs-on: macos-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: 1.22

      - name: Build macOS binary
        run: |
          echo "Building macOS binary"
          GOOS=darwin GOARCH=$(uname -m) go build -o touchdemo-${{ github.ref_name }}-mac main.go

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: touchdemo-${{ github.ref_name }}-mac
          path: touchdemo-${{ github.ref_name }}-mac

  release:
    needs: [build, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: touchdemo-${{ github.ref_name }}-amd64
          path: ./artifacts
      - uses: actions/download-artifact@v4
        with:
          name: touchdemo-${{ github.ref_name }}-arm64
          path: ./artifacts

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: touchdemo-${{ github.ref_name }}-mac
          path: ./artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: Automated build of touch demo
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ github.ref_name }} \
            ./artifacts/touchdemo-${{ github.ref_name }}-amd64 \
            ./artifacts/touchdemo-${{ github.ref_name }}-arm64 \
            ./artifacts/touchdemo-${{ github.ref_name }}-mac